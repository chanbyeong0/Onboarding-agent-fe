services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: onboarding-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    networks:
      - onboarding_net

networks:
  onboarding_net:
    external: true
